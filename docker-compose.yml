services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: quotesdb
    volumes:
      - ./sql/quotesdb.sql:/docker-entrypoint-initdb.d/quotesdb.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  php:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: quotesdb
      DB_USER: postgres
      DB_PASS: root
    depends_on:
      db:
        condition: service_healthy
